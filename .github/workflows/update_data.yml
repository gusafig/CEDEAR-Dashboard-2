name: Actualizar datos de mercado
on:
  schedule:
    - cron: "0 22 * * 1-5" # 19:00 hora Argentina
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install yfinance pandas --upgrade  # Quitamos pandas_ta que daba error

      - name: Descargar datos
        run: python fetch_data.py  # Asegúrate de que el archivo se llame así y esté en la raíz
      - name: Ejecutar motor de datos
        run: python fetch_data.py  # Corregido: ya no busca en /scripts/ ni en /src/
      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          git commit -m "Precios actualizados" || exit 0
          git push
