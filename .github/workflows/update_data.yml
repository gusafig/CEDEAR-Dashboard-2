name: Actualizar datos de mercado
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar herramientas
        run: pip install yfinance pandas --upgrade
      - name: Ejecutar motor
        run: python fetch_data.py  # AHORA BUSCA EN LA RAÍZ, NO EN SCRIPTS
      - name: Guardar datos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          git commit -m "Precios actualizados" || exit 0
          git push
